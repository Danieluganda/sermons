services:
  - type: web
    name: sermo-jo
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: DB_PATH
        value: /var/data/notes.db
      - key: SESSION_SECRET
        generateValue: true
    disk:
      name: sermo-data
      mountPath: /var/data
      sizeGB: 1
